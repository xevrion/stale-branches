name: Bug Report
description: Report a bug in stale-branches
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all sections so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run `npx stale-branches --dry-run`
        2. Select a branch
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full error output if there is one.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version` and paste the output.
      placeholder: "e.g. v22.0.0"
    validations:
      required: true

  - type: input
    id: stale-branches-version
    attributes:
      label: stale-branches version
      description: Run `npx stale-branches --version` and paste the output.
      placeholder: "e.g. 1.0.4"
    validations:
      required: true
